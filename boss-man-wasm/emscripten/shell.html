<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Boss-Man (Web)</title>
  <style>
    :root { --yellow: #FFE629; --dark: #111; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--dark); color: var(--yellow);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
    #canvas {
      background: #000;
      display: block;
      width: min(96vw, calc(96vh * 1184 / 644));
      aspect-ratio: 1184 / 644;
      border-radius: 10px;
      box-shadow: 0 16px 50px rgba(0,0,0,.6);
      outline: none;
    }
    #status { font-size: .95rem; opacity: .8; min-height: 1.2em; }
    #status.hidden { display: none; }
    a { color: var(--yellow); }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <div id="status">Loading Boss-Man…</div>

  <script type="text/javascript">
    var statusEl = document.getElementById('status');
    var Module = {
      canvas: document.getElementById('canvas'),
      print: function (t) { console.log(t); },
      printErr: function (t) { console.error(t); },
      setStatus: function (t) {
        if (statusEl) { statusEl.textContent = t; if (!t) statusEl.classList.add('hidden'); }
      },
      onRuntimeInitialized: function () { Module.setStatus(''); }
    };
    Module.setStatus('Loading Boss-Man…');
    // Keep keyboard focus on the canvas so arrow keys / P / E / F reach the game.
    window.addEventListener('load', function () { Module.canvas.focus(); });
    Module.canvas.addEventListener('click', function () { Module.canvas.focus(); });
  </script>
  {{{ SCRIPT }}}
</body>
</html>
