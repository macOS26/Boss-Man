<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFEC57"/>
      <stop offset="1" stop-color="#F7C814"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="22" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g transform="translate(512 600)" filter="url(#softShadow)">
    <text x="0" y="0" text-anchor="middle"
          font-family="Cooper Black, Cooper Std Black, AvenirNextCondensed-Heavy, Marker Felt Wide, Impact"
          font-size="640" font-weight="900" fill="#101010">BM</text>
  </g>
</svg>
