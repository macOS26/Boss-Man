name: Boss-Man
options:
  bundleIdPrefix: com.bossman
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Boss-Man:
    type: application
    platform: macOS
    sources:
      - path: Sources/Boss-Man
        excludes:
          - "Resources/**"
      - path: Sources/Boss-Man/Resources/RedStapler.svg
        buildPhase: resources
      - path: Sources/Boss-Man/Resources/AppIcon.icon
        buildPhase: resources
    info:
      path: Sources/Boss-Man/Resources/Info.plist
      properties:
        CFBundleIdentifier: com.bossman.toddbruss
        CFBundleName: Boss-Man
        CFBundleDisplayName: Boss-Man
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        CFBundleIconName: AppIcon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bossman.toddbruss
        PRODUCT_NAME: Boss-Man
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
