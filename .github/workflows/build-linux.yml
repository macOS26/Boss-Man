name: Build Linux (C++)

on:
  push:
    branches: [ main ]
    paths:
      - 'boss-man-box2d-sfml-cpp/**'
      - '.github/workflows/build-linux.yml'
  pull_request:
    paths:
      - 'boss-man-box2d-sfml-cpp/**'
      - '.github/workflows/build-linux.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: boss-man-box2d-sfml-cpp

jobs:
  build:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      # SFML 2.6 is built from source via FetchContent and needs the X11/GL/audio
      # dev headers. The same package names resolve on both x64 and Arm64.
      - name: Install SFML build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libudev-dev libgl1-mesa-dev \
            libfreetype-dev libopenal-dev libflac-dev libvorbis-dev libogg-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Bundle artifact
        run: |
          mkdir -p dist
          # All read-only assets are embedded in the binary; it links system
          # X11/GL/OpenAL shared libs at runtime.
          cp build/Boss-Man-linux dist/

      - uses: actions/upload-artifact@v4
        with:
          name: boss-man-linux-${{ matrix.arch }}
          path: boss-man-box2d-sfml-cpp/dist
          if-no-files-found: error
