name: SuperBox64 SpriteKit

on:
  push:
    paths:
      - 'wasm-web-kit/**'
      - 'boss-man-spritekit-web/**'
      - '.github/workflows/spritekit.yml'
  pull_request:
    paths:
      - 'wasm-web-kit/**'
      - 'boss-man-spritekit-web/**'
      - '.github/workflows/spritekit.yml'
  workflow_dispatch: {}

jobs:
  build:
    name: Build SuperBox64 SpriteKit (wasm32-wasip1)
    runs-on: macos-15
    env:
      SWIFT_VERSION: 6.3.2
      WASM_SDK: swift-6.3.2-RELEASE_wasm

    steps:
      - uses: actions/checkout@v4

      # Install swift.org Swift via swiftly (clean managed toolchain).
      - name: Install swiftly + Swift ${{ env.SWIFT_VERSION }}
        run: |
          curl -L https://swift-server.github.io/swiftly/swiftly-install.sh | bash -s -- -y
          source $HOME/.swiftly/env.sh || true
          swiftly install ${SWIFT_VERSION}
          swiftly use ${SWIFT_VERSION}

      # Install the wasm SDK matching the toolchain. The signed-bundle URL is
      # the one published with each Swift release.
      - name: Install wasm SDK
        run: |
          source $HOME/.swiftly/env.sh || true
          swift sdk install \
            https://download.swift.org/swift-${SWIFT_VERSION}-release/wasm/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE_wasm.artifactbundle.tar.gz \
            || true
          swift sdk list

      - name: Build SuperBox64 SpriteKit (debug + release)
        working-directory: wasm-web-kit/spritekit
        run: |
          source $HOME/.swiftly/env.sh || true
          ./build.sh
          ./build.sh release

      - name: Build Examples/Hello
        working-directory: wasm-web-kit/spritekit/Examples/Hello
        run: |
          source $HOME/.swiftly/env.sh || true
          TOOLCHAINS=org.swift.${SWIFT_VERSION}-release \
            xcrun --toolchain swift swift build \
            --swift-sdk ${WASM_SDK} -c release

      - name: Build BossMan SpriteKit demo
        working-directory: boss-man-spritekit-web
        run: |
          source $HOME/.swiftly/env.sh || true
          TOOLCHAINS=org.swift.${SWIFT_VERSION}-release \
            xcrun --toolchain swift swift build \
            --swift-sdk ${WASM_SDK} -c release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: superbox64-spritekit-wasm
          path: |
            wasm-web-kit/spritekit/.build/wasm32-unknown-wasip1/release/*.wasm
            wasm-web-kit/spritekit/Examples/Hello/.build/wasm32-unknown-wasip1/release/Hello.wasm
            boss-man-spritekit-web/.build/wasm32-unknown-wasip1/release/Demo.wasm
          if-no-files-found: warn
          retention-days: 30
