<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BOSS-MAN</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; height: 100%;
      background: #0b0b0f; color: #e6e6e6;
      font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
      display: flex; align-items: center; justify-content: center;
    }
    #stage { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    #game {
      width: min(96vw, calc(96vh * 1184 / 644));
      aspect-ratio: 1184 / 644;
      background: #000;
      border-radius: 6px;
      box-shadow: 0 10px 40px rgba(0,0,0,.6);
    }
    #game:fullscreen { width: 100vw; height: 100vh; border-radius: 0; }
    #game:-webkit-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
    #hint { font-size: 12px; opacity: .55; letter-spacing: .04em; }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="1184" height="644" tabindex="0"></canvas>
    <div id="hint">arrows move · F fullscreen · serve from boss-man-web/ then open /web/</div>
  </div>
  <script src="runtime.js"></script>
</body>
</html>
