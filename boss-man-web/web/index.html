<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Boss-Man · C++ → WebAssembly</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #0b0b0f; color: #ccc; overflow: hidden;
    font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
    display: flex; align-items: center; justify-content: center; }

  /* Launch screen — shown until Play is clicked. Keeping the heavy WASM out of
     the page until requested means a backgrounded tab Safari reloads lands back
     here (cheap) instead of re-booting the whole game. */
  #launch { text-align: center; padding: 24px; }
  #launch h1 { font-size: clamp(30px, 7vw, 60px); letter-spacing: 3px; color: #ffd23a; margin: 0 0 6px; }
  #launch .sub { opacity: 0.6; margin: 0 0 26px; font-size: 13px; }
  #play-btn { font: inherit; font-size: 20px; font-weight: 700; color: #0b0b0f;
    background: #ffd23a; border: 0; border-radius: 10px; padding: 14px 38px; cursor: pointer; }
  #play-btn:hover { filter: brightness(1.1); }
  .keys { margin-top: 24px; display: inline-grid; grid-template-columns: auto auto;
    gap: 7px 14px; font-size: 13px; opacity: 0.8; text-align: left; }
  .keys b { color: #ffd23a; font-weight: 700; justify-self: end; }

  /* Game frame — the iframe is injected here on Play and removed to unload. */
  #play-frame { display: none; width: min(96vw, calc(96vh * 1184 / 666)); aspect-ratio: 1184 / 666;
    background: #000; border-radius: 8px; overflow: hidden; }
  #play-frame iframe { width: 100%; height: 100%; border: 0; display: block; }
  body.playing #launch { display: none; }
  body.playing #play-frame { display: block; }
</style></head>
<body>
  <div id="launch">
    <h1>BOSS-MAN</h1>
    <p class="sub">Box2D + SFML C++, compiled to WebAssembly. No install, no plugins.</p>
    <button id="play-btn" type="button">▶ Play</button>
    <div class="keys">
      <b>Arrows</b><span>Move Pete</span>
      <b>Space / Click</b><span>Fire water gun</span>
      <b>P</b><span>Start a new game</span>
      <b>F</b><span>Fullscreen</span>
    </div>
  </div>
  <div id="play-frame"></div>

  <script>
    // Click-to-load: defer the WASM game until requested, then run it in an
    // iframe (src = local.html, which inlines everything so it works from
    // file:// and http alike — swap to server.html for an assets-folder deploy).
    document.getElementById('play-btn').addEventListener('click', function () {
      var frame = document.getElementById('play-frame');
      var iframe = document.createElement('iframe');
      iframe.src = 'local.html';
      iframe.title = 'Boss-Man (WebAssembly)';
      iframe.allow = 'autoplay; fullscreen';
      iframe.setAttribute('allowfullscreen', '');
      frame.innerHTML = '';
      frame.appendChild(iframe);
      document.body.classList.add('playing');
      iframe.addEventListener('load', function () { try { iframe.contentWindow.focus(); } catch (e) {} });
    });
  </script>
</body></html>
